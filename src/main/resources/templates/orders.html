<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>My Order History</h2>
<a href="/books" class="btn btn-secondary mb-3">Back to Books</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Total Price</th>
        <th>Items</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}">1</td>
        <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-06-21</td>
        <td th:text="${'$' + order.totalPrice}">0.00</td>
        <td>
            <ul>
                <li th:each="item : ${order.bookItems}"
                    th:text="${'Book ID: ' + item.bookId + ' (Qty: ' + item.quantity + ')'}">
                </li>
            </ul>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
