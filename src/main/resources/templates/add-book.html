<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
</head>
<body>

<h2>Add a New Book</h2>

<form th:action="@{/books/add}" th:object="${bookDto}" method="post">

    <div>
        <label for="name">Book Title:</label><br/>
        <input type="text" id="name" th:field="*{name}"/>
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
    </div><br/>

    <div>
        <label for="author">Author:</label><br/>
        <input type="text" id="author" th:field="*{author}"/>
        <span th:if="${#fields.hasErrors('author')}" th:errors="*{author}" style="color:red;"></span>
    </div><br/>

    <div>
        <label for="genre">Genre:</label><br/>
        <input type="text" id="genre" th:field="*{genre}"/>
        <span th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}" style="color:red;"></span>
    </div><br/>

    <div>
        <label for="price">Price:</label><br/>
        <input type="number" step="0.01" id="price" th:field="*{price}"/>
        <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" style="color:red;"></span>
    </div><br/>

    <div>
        <label for="ageGroup">Target Age Group:</label><br/>
        <select id="ageGroup" th:field="*{ageGroup}">
            <option th:each="age : ${T(com.epam.rd.autocode.spring.project.model.enums.AgeGroup).values()}"
                    th:value="${age}" th:text="${age}"></option>
        </select>
    </div><br/>

    <div>
        <label for="language">Language:</label><br/>
        <select id="language" th:field="*{language}">
            <option th:each="lang : ${T(com.epam.rd.autocode.spring.project.model.enums.Language).values()}"
                    th:value="${lang}" th:text="${lang}"></option>
        </select>
    </div><br/>

    <div>
        <label for="publicationDate">Publication Date:</label><br/>
        <input type="date" id="publicationDate" th:field="*{publicationDate}"/>
    </div><br/>

    <div>
        <label for="pages">Total Pages:</label><br/>
        <input type="number" id="pages" th:field="*{pages}"/>
    </div><br/>

    <div>
        <label for="description">Description:</label><br/>
        <textarea id="description" th:field="*{description}" rows="3" cols="30"></textarea>
    </div><br/>

    <div>
        <a th:href="@{/books}">Cancel</a>
        <button type="submit">Save Book</button>
    </div>
</form>

</body>
</html>
