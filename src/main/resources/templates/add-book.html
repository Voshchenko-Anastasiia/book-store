<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head th:replace="~{fragments/layout :: head(title='Add Book')}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <aside th:replace="~{fragments/layout :: sidebar}"></aside>

        <main class="col-md-10 p-4">
            <div class="card shadow-sm mx-auto" style="max-width: 600px;">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4 text-purple">Add a New Book</h2>

                    <form th:action="@{/books/add}" th:object="${bookDto}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Book Title</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" />
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="author" class="form-label fw-bold">Author</label>
                                <input type="text" id="author" th:field="*{author}" class="form-control" />
                                <div class="text-danger small" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="genre" class="form-label fw-bold">Genre</label>
                                <input type="text" id="genre" th:field="*{genre}" class="form-control" />
                                <div class="text-danger small" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label fw-bold">Price</label>
                                <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control" />
                                <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="pages" class="form-label fw-bold">Pages</label>
                                <input type="number" id="pages" th:field="*{pages}" class="form-control" />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="ageGroup" class="form-label fw-bold">Target Age Group</label>
                            <select id="ageGroup" th:field="*{ageGroup}" class="form-select">
                                <option th:each="age : ${T(com.epam.rd.autocode.spring.project.model.enums.AgeGroup).values()}"
                                        th:value="${age}" th:text="${age}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="language" class="form-label fw-bold">Language</label>
                            <select id="language" th:field="*{language}" class="form-select">
                                <option th:each="lang : ${T(com.epam.rd.autocode.spring.project.model.enums.Language).values()}"
                                        th:value="${lang}" th:text="${lang}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="publicationDate" class="form-label fw-bold">Publication Date</label>
                            <input type="date" id="publicationDate" th:field="*{publicationDate}" class="form-control" />
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/books}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary" style="background-color: #4A154B; border: none;">Save Book</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

</body>
</html>
