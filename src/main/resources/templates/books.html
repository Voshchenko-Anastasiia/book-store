<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:lang="${#locale.language}">

<head th:replace="~{fragments/layout :: head(#{books.title})}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">

        <aside class="col-md-2 sidebar-purple p-3" style="min-height: 85vh;">
            <h5 th:text="#{filter.title}">Filters & Sort</h5>
            <hr class="text-muted">

            <form th:action="@{/books}" method="get" class="d-flex flex-column gap-3">
                <input type="hidden" name="lang" th:value="${#locale.language}" />

                <div>
                    <label for="name" class="form-label text-dark fw-semibold" th:text="#{books.name}">Name</label>
                    <input type="text" id="name" name="name" class="form-control form-control-sm"
                           th:value="${currentName}"
                           th:placeholder="#{placeholder.name}">
                </div>

                <div>
                    <label for="author" class="form-label text-dark fw-semibold" th:text="#{books.author}">Author</label>
                    <input type="text" id="author" name="author" class="form-control form-control-sm"
                           th:value="${currentAuthor}"
                           th:placeholder="#{placeholder.author}">
                </div>

                <div>
                    <label for="sortBy" class="form-label text-dark fw-semibold" th:text="#{filter.sortBy}">Sort By</label>
                    <select id="sortBy" name="sortBy" class="form-select form-select-sm">
                        <option value="id" th:selected="${sortBy == 'id'}" th:text="#{filter.sort.date}">Date Added</option>
                        <option value="name" th:selected="${sortBy == 'name'}" th:text="#{books.name}">Name</option>
                        <option value="author" th:selected="${sortBy == 'author'}" th:text="#{books.author}">Author</option>
                        <option value="price" th:selected="${sortBy == 'price'}" th:text="#{books.price}">Price</option>
                    </select>
                </div>

                <div>
                    <label for="sortDir" class="form-label text-dark fw-semibold" th:text="#{filter.sortDir}">Direction</label>
                    <select id="sortDir" name="sortDir" class="form-select form-select-sm">
                        <option value="ASC" th:selected="${sortDir == 'ASC'}" th:text="#{filter.dir.asc}">Ascending</option>
                        <option value="DESC" th:selected="${sortDir == 'DESC'}" th:text="#{filter.dir.desc}">Descending</option>
                    </select>
                </div>

                <div class="d-grid gap-2 mt-2">
                    <button type="submit" class="btn btn-sm text-white fw-bold" style="background-color: #4A154B;" th:text="#{filter.apply}">Search</button>
                    <a href="/books" class="btn btn-outline-secondary btn-sm" th:text="#{filter.reset}">Clear</a>
                </div>
            </form>
        </aside>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold" style="color: #2D0B30;" th:text="#{books.title}">Books Catalog</h2>
                <div sec:authorize="hasAnyRole('EMPLOYEE', 'ADMIN')">
                    <a href="/books/add" class="btn btn-success" th:text="#{books.add}">Add New Book</a>
                </div>
            </div>

            <table class="table table-striped table-hover align-middle shadow-sm rounded">
                <thead class="text-white" style="background-color: #2D0B30;">
                <tr>
                    <th th:text="#{books.name}">Name</th>
                    <th th:text="#{books.author}">Author</th>
                    <th th:text="#{books.price}">Price</th>
                    <th th:text="#{books.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${bookPage.content}">
                    <td class="fw-semibold" th:text="${book.name}">Name</td>
                    <td th:text="${book.author}">Author</td>
                    <td th:text="${book.price}">Price</td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-info btn-sm" th:text="#{books.view}">View</a>

                            <form sec:authorize="hasAnyRole('EMPLOYEE', 'ADMIN')" th:action="@{/books/delete/{id}(id=${book.id})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm" th:text="#{books.delete}">Delete</button>
                            </form>

                            <form th:action="@{/basket/add}" method="post" class="d-flex gap-2">
                                <input type="hidden" name="bookId" th:value="${book.id}" />
                                <input type="number" name="quantity" value="1" min="1" max="10" class="form-control form-control-sm" style="width: 60px;">
                                <button type="submit" class="btn btn-primary btn-sm">Add</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="d-flex justify-content-center align-items-center gap-2 mt-4">
                <a class="btn btn-outline-secondary btn-sm"
                   th:if="${bookPage.number > 0}"
                   th:href="@{/books(page=0, name=${currentName}, author=${currentAuthor}, sortBy=${sortBy}, sortDir=${sortDir}, lang=${#locale.language})}"
                   th:text="#{pagination.first}">First</a>

                <a class="btn btn-outline-secondary btn-sm"
                   th:if="${bookPage.hasPrevious()}"
                   th:href="@{/books(page=${bookPage.number - 1}, name=${currentName}, author=${currentAuthor}, sortBy=${sortBy}, sortDir=${sortDir}, lang=${#locale.language})}"
                   th:text="#{pagination.previous}">Previous</a>

                <span class="mx-2 fw-bold text-muted" th:text="#{pagination.info(${bookPage.number + 1}, ${bookPage.totalPages})}">1 / 1</span>

                <a class="btn btn-outline-secondary btn-sm"
                   th:if="${bookPage.hasNext()}"
                   th:href="@{/books(page=${bookPage.number + 1}, name=${currentName}, author=${currentAuthor}, sortBy=${sortBy}, sortDir=${sortDir}, lang=${#locale.language})}"
                   th:text="#{pagination.next}">Next</a>

                <a class="btn btn-outline-secondary btn-sm"
                   th:if="${bookPage.number < bookPage.totalPages - 1}"
                   th:href="@{/books(page=${bookPage.totalPages - 1}, name=${currentName}, author=${currentAuthor}, sortBy=${sortBy}, sortDir=${sortDir}, lang=${#locale.language})}"
                   th:text="#{pagination.last}">Last</a>
            </div>
        </main>
    </div>
</div>

</body>
</html>
