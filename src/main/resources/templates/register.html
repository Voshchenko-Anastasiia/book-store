<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        .error-message { color: red; font-size: 0.9em; display: block; margin-top: 2px; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>

<h2 th:text="#{registration.title}">Create an Account</h2>

<div class="language-switcher">
    <a th:href="@{/register(lang='en')}">English</a> |
    <a th:href="@{/register(lang='uk')}">Українська</a>
</div>
<br/>

<form th:action="@{/register}" th:object="${userDto}" method="post">

    <div class="form-group">
        <label for="name" th:text="#{registration.name}">Name:</label>
        <input type="text" id="name" th:field="*{name}" />
        <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div class="form-group">
        <label for="email" th:text="#{registration.email}">Email:</label>
        <input type="text" id="email" th:field="*{email}" />
        <span class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <div class="form-group">
        <label for="password" th:text="#{registration.password}">Password:</label>
        <input type="password" id="password" th:field="*{password}" />
        <span class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>

    <div class="form-group">
        <label for="role" th:text="#{registration.role}">Account Type:</label>
        <select id="role" th:field="*{role}">
            <option value="CLIENT" th:text="#{registration.role.client}">Client</option>
            <option value="EMPLOYEE" th:text="#{registration.role.employee}">Employee</option>
        </select>
        <span class="error-message" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
    </div>

    <button type="submit" th:text="#{registration.button}">Register</button>
</form>

<br/>
<p>Already have an account? <a th:href="@{/login}" th:text="#{login.link}">Login here</a></p>

</body>
</html>
