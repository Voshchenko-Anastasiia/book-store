<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:lang="${#locale.language}">

<head th:replace="~{fragments/layout :: head(title='My Cabinet')}"></head>

<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container-fluid">
    <div class="row">

        <div th:replace="~{fragments/layout :: sidebar}"></div>

        <main class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Welcome to Your Cabinet, <span sec:authentication="name" class="text-primary">User</span>!</h2>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body text-center">
                            <h5 class="card-title text-muted">My Orders</h5>
                            <p class="card-text">View your complete order history and track past purchases.</p>
                            <a href="/cabinet/orders" class="btn btn-outline-primary">View Orders</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4" sec:authorize="hasRole('CLIENT')">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body text-center">
                            <h5 class="card-title text-muted">My Basket</h5>
                            <p class="card-text">Check the items you have saved for checkout.</p>
                            <a href="/basket" class="btn btn-outline-success">Go to Basket</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
                    <div class="card shadow-sm mb-4 border-warning">
                        <div class="card-body text-center">
                            <h5 class="card-title text-warning">Admin Tools</h5>
                            <p class="card-text">Manage users, roles, and store inventory.</p>
                            <a href="/admin/users" class="btn btn-warning">Manage Users</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

</body>
</html>
