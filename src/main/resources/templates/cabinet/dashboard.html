<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:lang="${#locale.language}">

<head th:replace="~{fragments/layout :: head(title='My Cabinet')}"></head>

<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container-fluid">
    <div class="row">

        <div th:replace="~{fragments/layout :: sidebar}"></div>

        <main class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="color: var(--purple-primary);">Welcome to Your Cabinet, <span sec:authentication="name" class="text-primary">User</span>!</h2>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow-sm border-0" style="border-radius: 12px;">
                        <div class="card-body p-4">
                            <h5 class="card-title text-success mb-2">My Wallet</h5>
                            <h2 class="fw-bold mb-3">$<span th:text="${user.balance != null ? user.balance : '0.00'}"></span></h2>

                            <form th:action="@{/cabinet/top-up}" method="post">
                                <div class="input-group">
                                    <span class="input-group-text bg-white">$</span>
                                    <input type="number" name="amount" class="form-control" min="1" step="0.01" placeholder="Amount" required>
                                    <button type="submit" class="btn btn-success">Top Up</button>
                                </div>
                            </form>

                            <div th:if="${param.topupSuccess}" class="alert alert-success border-0 small py-1 px-2 mt-2 mb-0">
                                Balance successfully updated!
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm mb-4 border-0" style="border-radius: 12px;">
                        <div class="card-body text-center p-4">
                            <h5 class="card-title text-muted">My Orders</h5>
                            <p class="card-text text-secondary">View your complete order history and track past purchases.</p>
                            <a href="/cabinet/orders" class="btn btn-outline-primary" style="border-color: var(--purple-primary); color: var(--purple-primary);">View Orders</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4" sec:authorize="hasRole('CLIENT')">
                    <div class="card shadow-sm mb-4 border-0" style="border-radius: 12px;">
                        <div class="card-body text-center p-4">
                            <h5 class="card-title text-muted">My Basket</h5>
                            <p class="card-text text-secondary">Check the items you have saved for checkout.</p>
                            <a href="/basket" class="btn btn-outline-success">Go to Basket</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
                    <div class="card shadow-sm mb-4 border-warning border-0" style="border-radius: 12px;">
                        <div class="card-body text-center p-4">
                            <h5 class="card-title text-warning">Admin Tools</h5>
                            <p class="card-text text-secondary">Manage users, roles, and store inventory.</p>
                            <a href="/admin/users" class="btn btn-warning">Manage Users</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

</body>
</html>
