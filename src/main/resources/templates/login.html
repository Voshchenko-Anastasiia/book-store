<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-header text-white text-center py-3" style="background: var(--purple-gradient);">
                    <h4 class="mb-0 fw-bold">Sign In</h4>
                </div>
                <div class="card-body p-4 bg-white">

                    <div class="alert alert-danger fw-medium small py-2" th:if="${errorMessage}">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${errorMessage}">Invalid username or password.</span>
                    </div>

                    <div class="alert alert-success fw-medium small py-2" th:if="${param.success}">
                        Registration successful! Please sign in.
                    </div>

                    <form th:action="@{/login}" method="post" class="d-flex flex-column gap-3">

                        <div>
                            <label for="email" class="form-label fw-semibold text-dark">Email Address</label>
                            <input type="email" id="email" name="email"
                                   class="form-control"
                                   placeholder="name@example.com"
                                   required />
                        </div>

                        <div>
                            <label for="password" class="form-label fw-semibold text-dark">Password</label>
                            <input type="password" id="password" name="password"
                                   class="form-control"
                                   placeholder="Enter your password"
                                   required />
                        </div>

                        <div class="d-grid mt-3">
                            <button type="submit" class="btn text-white fw-bold py-2" style="background-color: var(--purple-primary);">
                                Sign In
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted small">Don't have an account? </span>
                        <a href="/register" class="small fw-semibold text-decoration-none" style="color: var(--purple-primary);">Sign Up Here</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
