<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Bookstore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root { --purple-primary: #4A154B; --purple-gradient: linear-gradient(135deg, #5B1B5C 0%, #2D0B30 100%); --purple-light: #F6EFF7; --purple-accent: #BB86FC; --purple-hover: #E8D7EC; }
        .bg-purple-nav { background: var(--purple-gradient) !important; box-shadow: 0 4px 12px rgba(45, 11, 48, 0.2); border-bottom: 2px solid var(--purple-accent); }
        .btn-lucky { background-color: transparent; color: var(--purple-accent) !important; border: 2px dashed var(--purple-accent); font-weight: bold; transition: all 0.3s ease; }
        .btn-lucky:hover { background-color: var(--purple-accent); color: #2D0B30 !important; box-shadow: 0 0 12px var(--purple-accent); transform: scale(1.05); }
        .sidebar-purple { background-color: var(--purple-light) !important; border-right: 2px solid #E1D2E4 !important; border-radius: 0 12px 12px 0; }
        .sidebar-purple h5 { color: var(--purple-primary); font-weight: 700; letter-spacing: 0.5px; }
        .nav-link-custom { color: var(--purple-primary) !important; font-weight: 500; transition: all 0.2s ease-in-out; border-radius: 8px !important; }
        .nav-link-custom:hover { background-color: var(--purple-hover) !important; padding-left: 15px; }
    </style>
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-purple-nav mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-4" href="/" th:text="#{books.title}">Bookstore</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="/books" th:text="#{nav.home}">Home</a></li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" href="/basket" th:text="#{nav.viewBasket}">My Basket</a>
                </li>
                <li class="nav-item ms-3">
                    <a href="/books/lucky" class="btn btn-lucky btn-sm px-3">🔮 Lucky Book</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <a href="/cabinet" class="btn btn-outline-light btn-sm me-2" th:text="#{nav.cabinet}">Cabinet</a>

                <a sec:authorize="hasRole('ADMIN')"
                   href="/admin/orders"
                   class="btn btn-outline-warning btn-sm me-2">Admin Panel</a>

                <div class="me-4">
                    <a class="text-white text-decoration-none" th:href="@{''(lang='en')}">EN</a>
                    <span class="text-white mx-1">|</span>
                    <a class="text-white text-decoration-none" th:href="@{''(lang='uk')}">UK</a>
                </div>

                <span class="text-white me-3 opacity-90">
                    <span th:text="#{user.hello}">Hello</span>, <strong class="text-warning" sec:authentication="name">User</strong>
                </span>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm" th:text="#{logout.button}">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<aside th:fragment="sidebar" class="col-md-2 sidebar-purple p-4" style="min-height: 85vh;">
    <h5 class="text-uppercase small mb-3" th:text="#{nav.cabinet}">Cabinet Menu</h5>
    <hr class="text-muted">
    <ul class="nav flex-column gap-2">
        <li class="nav-item">
            <a class="nav-link btn text-start border-0 nav-link-custom" href="/cabinet">📊 Dashboard</a>
        </li>
        <li class="nav-item">
            <a class="nav-link btn text-start border-0 nav-link-custom" href="/cabinet/orders">📦 My Orders</a>
        </li>
    </ul>
</aside>

<aside th:fragment="admin-sidebar" class="col-md-2 sidebar-purple p-4" style="min-height: 85vh;">
    <h5 class="text-uppercase small mb-3">Admin Panel</h5>
    <hr class="text-muted">
    <ul class="nav flex-column gap-2">
        <li class="nav-item">
            <a class="nav-link btn text-start border-0 nav-link-custom" href="/admin/orders">📋 Manage Orders</a>
        </li>
        <li class="nav-item">
            <a class="nav-link btn text-start border-0 nav-link-custom" href="/admin/users">👥 Manage Users</a>
        </li>
    </ul>
</aside>

</body>
</html>
