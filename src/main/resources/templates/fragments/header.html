<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Global Fragment Header</title>
    <th:block th:fragment="header-css">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </th:block>
</head>
<body>

<nav th:fragment="navbar" class="navbar" style="display: flex; justify-content: space-between; padding: 15px; background: #343a40; color: white; align-items: center;">
    <div>
        <a th:href="@{/books}" style="color: white; text-decoration: none; font-size: 1.5rem; font-weight: bold;">📚 Bookstore</a>
    </div>

    <div style="display: flex; align-items: center; gap: 20px;">
        <th:block data-sec-authorize="isAuthenticated()">
            <span style="font-size: 0.9rem; color: #bbb;">
                Logged in as: <strong data-sec-authentication="name" style="color: white;">User</strong>
            </span>
        </th:block>

        <form method="get" action="" style="margin: 0; display: inline-flex; align-items: center;">
            <label for="lang-select" style="color: white; margin-right: 8px; font-size: 0.9rem;">🌐 Language:</label>
            <select id="lang-select" name="lang" onchange="this.form.submit()" style="padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer;">
                <option value="en" th:selected="${#locale.language == 'en'}">English</option>
                <option value="uk" th:selected="${#locale.language == 'uk'}">Українська</option>
            </select>
        </form>

        <th:block data-sec-authorize="isAuthenticated()">
            <a th:href="@{/login?logout}" style="color: #ffc107; text-decoration: none; font-size: 0.9rem;">Logout</a>
        </th:block>
    </div>
</nav>

</body>
</html>
