<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Register Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Register New Employee</h4>
                </div>
                <div class="card-body">

                    <form th:action="@{/admin/users/create-employee}" th:object="${userDTO}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text"
                                   th:field="*{name}"
                                   id="name"
                                   class="form-control"
                                   placeholder="John Doe"
                                   required />
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email"
                                   th:field="*{email}"
                                   id="email"
                                   class="form-control"
                                   placeholder="employee@company.com"
                                   required />
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Temporary Password</label>
                            <input type="password"
                                   th:field="*{password}"
                                   id="password"
                                   class="form-control"
                                   placeholder="••••••••"
                                   required />
                        </div>

                        <div class="alert alert-info py-2 small" role="alert">
                            <strong>Note:</strong> This user will automatically be assigned the <strong>EMPLOYEE</strong> role upon submission.
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Create Account</button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
