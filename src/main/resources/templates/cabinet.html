<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <title>My Cabinet</title>
</head>
<body>
<h1>My Orders</h1>

<div th:if="${orders.isEmpty()}">
    <p>You have no orders yet.</p>
</div>

<table border="1" th:if="${!orders.isEmpty()}">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Status</th>
        <th>Date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}">123</td>
        <td th:text="${order.status}">Pending</td>
        <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">2026-06-21</td>
    </tr>
    </tbody>
</table>

<br>
<a href="/books">Back to Shop</a>
</body>
</html>
