<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:lang="${#locale.language}">

<head th:replace="~{fragments/layout :: head('My Basket')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header text-white py-3" style="background: var(--purple-gradient);">
            <h3 class="mb-0 fw-bold" th:text="#{nav.viewBasket}">My Basket</h3>
        </div>

        <div class="card-body p-4 bg-white">

            <div th:if="${#lists.isEmpty(basketItems)}" class="text-center py-5">
                <h5 class="text-muted mb-3">Your basket is currently empty.</h5>
                <a href="/books" class="btn btn-primary px-4 fw-bold" style="background-color: var(--purple-primary);">Go Shopping</a>
            </div>

            <div th:if="${!#lists.isEmpty(basketItems)}">
                <table class="table table-hover align-middle mb-4">
                    <thead class="table-light text-muted small text-uppercase">
                    <tr>
                        <th>Book Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${basketItems}">
                        <td class="fw-semibold text-dark" th:text="${item.book.name}">Book Name</td>
                        <td th:text="${'$' + item.book.price}">0.00</td>
                        <td th:text="${item.quantity}">1</td>
                        <td class="fw-bold" th:text="${'$' + #numbers.formatDecimal(item.book.price * item.quantity, 1, 2)}">0.00</td>
                        <td>
                            <form th:action="@{/basket/remove/{id}(id=${item.book.id})}" method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Remove</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                    <tfoot class="border-top">
                    <tr>
                        <td colspan="3" class="text-end pt-3 h5">Grand Total:</td>
                        <td class="pt-3 h5 fw-bold text-success" th:text="${'$' + #numbers.formatDecimal(grandTotal, 1, 2)}">$0.00</td>
                        <td></td>
                    </tr>
                    </tfoot>
                </table>

                <div class="d-flex justify-content-end mt-3">
                    <form th:action="@{/basket/order}" method="post">
                        <button type="submit" class="btn btn-lg text-white px-5 fw-bold" style="background-color: var(--purple-primary);">Confirm Purchase</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
