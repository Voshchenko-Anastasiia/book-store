<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Basket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Your Basket</h2>

<div th:if="${#lists.isEmpty(basketItems)}">
    <p>Your basket is empty.</p>
    <a href="/books" class="btn btn-primary">Go Shopping</a>
</div>

<div th:if="${!#lists.isEmpty(basketItems)}">
    <table class="table">
        <thead>
        <tr>
            <th>Book Name</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${basketItems}">
            <td th:text="${book.name}">Book Name</td>
            <td th:text="${'$' + book.price}">0.00</td>
            <td>
                <form th:action="@{/basket/remove/{id}(id=${book.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <form th:action="@{/basket/order}" method="post">
        <button type="submit" class="btn btn-success">Confirm Purchase</button>
    </form>
</div>
</body>
</html>
